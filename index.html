<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@gdzunzun | Enlaces</title>
    
    <!-- Fuentes de Google e Iconos -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0f172a; 
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --hover-transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 3rem 1rem;
            background-image: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        header {
            text-align: center;
        }

        /* Puedes cambiar la URL del src por la foto de perfil que desees */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--card-bg);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            margin-bottom: 1rem;
            background-color: #334155; /* Color de fondo temporal */
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .section-title {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            text-align: center;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .section-title::before, .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background-color: var(--card-bg);
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-card {
            display: flex;
            align-items: center;
            padding: 1rem 1.5rem;
            background-color: var(--card-bg);
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-primary);
            transition: var(--hover-transition);
            border: 1px solid transparent;
        }

        .link-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .link-card i {
            font-size: 1.5rem;
            width: 40px;
            transition: var(--hover-transition);
        }

        .link-info {
            display: flex;
            flex-direction: column;
        }

        .link-title {
            font-weight: 600;
            font-size: 1.05rem;
        }

        .link-subtitle {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Colores de las plataformas al hacer hover */
        .tiktok:hover { border-color: #ff0050; }
        .tiktok:hover i { color: #ff0050; }
        
        .instagram:hover { border-color: #e1306c; }
        .instagram:hover i { color: #e1306c; }
        
        .twitter:hover { border-color: #1da1f2; }
        .twitter:hover i { color: #1da1f2; }
        
        .reddit:hover { border-color: #ff4500; }
        .reddit:hover i { color: #ff4500; }
        
        .facebook:hover { border-color: #1877f2; }
        .facebook:hover i { color: #1877f2; }
        
        .youtube:hover { border-color: #ff0000; }
        .youtube:hover i { color: #ff0000; }

        /* Estilo para los slots vacíos de la sección de ventas */
        .empty-slot {
            border: 2px dashed var(--card-bg);
            background: transparent;
            justify-content: center;
            color: var(--text-secondary);
        }

        .empty-slot:hover {
            transform: none;
            border-color: var(--text-secondary);
            box-shadow: none;
        }

        .empty-slot .link-title {
            font-weight: 400;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

</body>
